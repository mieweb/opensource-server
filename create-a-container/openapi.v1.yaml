        '403': { $ref: '#/components/responses/Forbidden' }
  /groups/{id}:
    parameters: [{ in: path, name: id, required: true, schema: { type: integer }, description: gidNumber }]
    get:
      tags: [Groups]
      responses:
        '200':
          description: Group
          content:
            application/json:
              schema: { type: object, properties: { data: { $ref: '#/components/schemas/Group' } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Groups]
      summary: Update a group (admin)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cn: { type: string }
                isAdmin: { type: boolean }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { type: object, properties: { data: { $ref: '#/components/schemas/Group' } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Groups]
      summary: Delete a group (admin)
      responses:
