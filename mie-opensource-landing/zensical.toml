[project]
site_name = "Opensource at MIE"
site_description = "A centralized place for all things open source at MIE"
repo_url = "https://github.com/mieweb/opensource-server"
repo_name = "mieweb/opensource-server"
edit_uri = "edit/main/mie-opensource-landing/docs/"
copyright = "&copy; Medical Informatics Engineering"

nav = [
  { "Home" = "index.md" },
  { "Create a Container" = "{{ manager_url }}" },
  { "Launchpad" = "https://github.com/marketplace/actions/mieweb-launchpad" },
  { "Documentation" = [
    { "Introduction" = "intro.md" },
    { "Users" = [
      { "Getting Started" = "users/getting-started.md" },
      { "Creating Containers" = [
        { "Web GUI" = "users/creating-containers/web-gui.md" },
        { "API with curl" = "users/creating-containers/command-line.md" },
        { "Building Custom Templates" = "users/creating-containers/using-environment-variables.md" },
        { "API Keys" = "users/creating-containers/api-keys.md" },
      ] },
      { "Monitoring Containers" = "users/monitoring-container.md" },
      { "Launchpad" = [
        { "What is Launchpad" = "users/proxmox-launchpad/what-is-proxmox-launchpad.md" },
        { "Getting Started" = "users/proxmox-launchpad/getting-started.md" },
      ] },
      { "VS Code Setup" = "users/vscode-setup.md" },
      { "MCP Server" = "users/mcp-server.md" },
    ] },
    { "Admins" = [
      { "Overview" = "admins/index.md" },
      { "Installation" = "admins/installation.md" },
      { "Core Concepts" = [
        { "Overview" = "admins/core-concepts/index.md" },
        { "Containers" = "admins/core-concepts/containers.md" },
        { "External Domains" = "admins/core-concepts/external-domains.md" },
        { "Nodes" = "admins/core-concepts/nodes.md" },
        { "Sites" = "admins/core-concepts/sites.md" },
        { "Users and Groups" = "admins/core-concepts/users-and-groups.md" },
      ] },
      { "Settings" = "admins/settings.md" },
      { "LDAP Servers" = "admins/ldap-servers.md" },
      { "Deploying Agents" = "admins/deploying-agents.md" },
      { "Kernel Keyring" = "admins/kernel-keyring.md" },
      { "NVIDIA Container Toolkit" = "admins/nvidia-container-toolkit.md" },
    ] },
    { "Developers" = [
      { "System Architecture" = "developers/system-architecture.md" },
      { "Core Technologies" = "developers/core-technologies.md" },
      { "Development Workflow" = "developers/development-workflow.md" },
      { "Docker Images" = "developers/docker-images.md" },
      { "Database Schema" = "developers/database-schema.md" },
      { "Pull Config" = "developers/pull-config.md" },
      { "Contributing" = "developers/contributing.md" },
    ] },
  ] },
]

[project.theme]
variant = "modern"
favicon = "assets/img/mie_favicon.ico"
logo = "assets/img/mie_icon_logo.png"
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.expand",
  "navigation.top",
  "navigation.footer",
  "search.suggest",
  "search.highlight",
  "content.code.copy",
  "content.action.edit",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "green"

[project.theme.palette.toggle]
icon = "material/brightness-7"
name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "green"

[project.theme.palette.toggle]
icon = "material/brightness-4"
name = "Switch to light mode"

[project.markdown_extensions.zensical.extensions.macros]
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/mieweb/opensource-server"
